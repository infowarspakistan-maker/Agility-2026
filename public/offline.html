<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Agility Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 40px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px 0;
            color: #0f172a;
        }
        p {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }
        .btn {
            display: inline-block;
            background-color: #f97316;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
        }
        .btn:hover {
            background-color: #ea580c;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✈️</div>
        <h1>You are Offline</h1>
        <p>It looks like you don't have an active internet connection right now. We've saved your booked itineraries locally so you can still view them. We will restore full access once you're back online.</p>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
    </div>
</body>
</html>
